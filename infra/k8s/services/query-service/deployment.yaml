apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-service
  namespace: loglens
spec:
  replicas: 2
  selector:
    matchLabels:
      app: query-service
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: query-service
    spec:
      containers:
        - name: query-service
          image: loglens/query-service:latest
          ports:
            - containerPort: 8084
          envFrom:
            - secretRef:
                name: loglens-secrets
          env:
            - name: OTEL_SERVICE_NAME
              value: query-service
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8084 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8084 }
            initialDelaySeconds: 40
            periodSeconds: 30
