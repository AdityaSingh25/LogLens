apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: loglens
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: loglens/auth-service:latest
          ports:
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: loglens-secrets
          env:
            - name: OTEL_SERVICE_NAME
              value: auth-service
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 30
