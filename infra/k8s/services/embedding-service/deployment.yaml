apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: loglens
spec:
  replicas: 2
  selector:
    matchLabels:
      app: embedding-service
  minReadySeconds: 10
  template:
    metadata:
      labels:
        app: embedding-service
    spec:
      containers:
        - name: embedding-service
          image: loglens/embedding-serviceatest
          envFrom:
            - secretRef:
                name: loglens-secrets
          env:
            - name: OTEL_SERVICE_NAME
              value: embedding-service
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            exec:
              command: ["node", "-e", "process.exit(0)"]
            initialDelaySeconds: 10
            periodSeconds: 15
