server:
  port: 8082

spring:
  application:
    name: ingestion-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_JWKS_URI:http://localhost:8081/auth/.well-known/jwks.json}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.loglens: INFO
