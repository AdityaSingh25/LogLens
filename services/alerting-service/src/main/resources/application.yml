server:
  port: 8085

spring:
  application:
    name: alerting-service
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_JWKS_URI:http://localhost:8081/auth/.well-known/jwks.json}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:loglens}
    username: ${POSTGRES_USER:loglens}
    password: ${POSTGRES_PASSWORD:loglens}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: alerting-service

alerting:
  zscore:
    threshold: 3.0
  window:
    history-count: 20
  evaluation:
    interval-ms: 60000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.loglens: INFO
