name: CI — parser-service

on:
  push:
    paths: ['services/parser-service/**', 'contracts/**']
  pull_request:
    paths: ['services/parser-service/**', 'contracts/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin', cache: 'maven' }
      - run: mvn -pl services/parser-service package -DskipTests -q
      - run: mvn -pl services/parser-service test -q
