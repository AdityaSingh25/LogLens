name: CI — auth-service

on:
  push:
    paths:
      - 'services/auth-service/**'
      - 'contracts/**'
  pull_request:
    paths:
      - 'services/auth-service/**'
      - 'contracts/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn -pl services/auth-service package -DskipTests -q

      - name: Unit tests
        run: mvn -pl services/auth-service test -Dtest="**/service/**" -q

      - name: Integration tests
        run: mvn -pl services/auth-service test -Dtest="**/api/**" -q

      - name: Build Docker image
        run: |
          if [ -f services/auth-service/Dockerfile ]; then
            docker build -t loglens/auth-service:${{ github.sha }} services/auth-service/
          fi
