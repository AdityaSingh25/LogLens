name: CI — embedding-service

on:
  push:
    paths: ['services/embedding-service/**', 'contracts/**']
  pull_request:
    paths: ['services/embedding-service/**', 'contracts/**']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: services/embedding-service/package-lock.json }
      - run: cd services/embedding-service && npm ci
      - run: cd services/embedding-service && npm run lint
      - run: cd services/embedding-service && npm run build
      - run: cd services/embedding-service && npm test
